<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎈弹幕推送</title>
    <link rel="icon" href="./img/favicon.ico">
    <style>
        :root {
            --primary-color: #5a67d8;
            --primary-hover: #434190;
            --bg-color: #f7fafc;
            --card-bg: #ffffff;
            --text-main: #2d3748;
            --text-muted: #718096;
            --radius: 12px;
            --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            line-height: 1.5;
            padding: 20px;
        }

        .header {
            max-width: 1200px;
            margin: 0 auto 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header h1 {
            font-size: 1.8rem;
            color: var(--primary-color);
        }

        .btn {
            padding: 10px 20px;
            background: var(--primary-color);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
        }

        .btn:hover {
            background: var(--primary-hover);
        }

        .btn:disabled {
            background: #a0aec0;
            cursor: not-allowed;
        }

        .btn-secondary {
            background: #edf2f7;
            color: var(--text-main);
        }

        .btn-secondary:hover {
            background: #e2e8f0;
        }

        .settings-btn {
            background: var(--card-bg);
            color: var(--text-main);
            box-shadow: var(--shadow);
        }

        .search-container {
            max-width: 600px;
            margin: 0 auto 40px;
            display: flex;
            gap: 10px;
        }

        .search-input {
            flex: 1;
            padding: 12px 20px;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            font-size: 1rem;
            outline: none;
            transition: 0.2s;
        }

        .search-input:focus {
            border-color: var(--primary-color);
        }

        .main-content {
            max-width: 1200px;
            margin: 0 auto;
        }

        .loading,
        .error,
        .no-data {
            text-align: center;
            padding: 40px;
            color: var(--text-muted);
            font-size: 1.1rem;
        }

        .error {
            color: #e53e3e;
        }

        /* 卡片与网格 */
        .source-group {
            margin-bottom: 40px;
        }

        .source-title {
            font-size: 1.3rem;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 2px solid #e2e8f0;
            color: #4a5568;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .source-logo {
            width: 26px;
            height: 26px;
            border-radius: 4px;
            object-fit: contain;
        }

        .source-count {
            font-size: 0.9rem;
            background: #e2e8f0;
            padding: 2px 10px;
            border-radius: 12px;
            margin-left: auto;
            font-weight: 600;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 20px;
        }

        .card {
            background: var(--card-bg);
            border-radius: var(--radius);
            overflow: hidden;
            box-shadow: var(--shadow);
            cursor: pointer;
            transition: 0.2s;
            display: flex;
            flex-direction: column;
        }

        .card:hover {
            transform: translateY(-5px);
        }

        .card-img {
            width: 100%;
            height: 230px;
            object-fit: cover;
            background-color: #edf2f7;
        }

        .card-info {
            padding: 12px;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .card-title {
            font-size: 1.05rem;
            font-weight: 600;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .tag {
            background: #ebf4ff;
            color: #3182ce;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 0.8rem;
            font-weight: 500;
        }

        /* 剧集列表与优化后的分组标题 */
        .details-header {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 25px;
        }

        .back-btn {
            background: none;
            border: none;
            font-size: 1rem;
            color: var(--primary-color);
            cursor: pointer;
            font-weight: 600;
        }

        .episode-source-group {
            margin-bottom: 30px;
            background: var(--card-bg);
            padding: 20px;
            border-radius: var(--radius);
            box-shadow: var(--shadow);
        }

        .episode-source-title {
            font-size: 1.05rem;
            color: var(--primary-hover);
            margin-bottom: 15px;
            padding: 8px 12px;
            background: #ebf4ff;
            border-left: 4px solid var(--primary-color);
            border-radius: 0 4px 4px 0;
            font-weight: 600;
        }

        .episodes-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .episode-btn {
            background: var(--bg-color);
            border: 1px solid #e2e8f0;
            padding: 12px 16px;
            border-radius: 8px;
            cursor: pointer;
            text-align: left;
            font-size: 0.95rem;
            transition: 0.2s;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .episode-btn:hover {
            border-color: var(--primary-color);
            background: #ebf4ff;
            color: var(--primary-color);
        }

        /* 模态框 */
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(4px);
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .modal {
            background: var(--card-bg);
            padding: 30px;
            border-radius: var(--radius);
            width: 90%;
            max-width: 500px;
            box-shadow: var(--shadow);
        }

        .modal h2 {
            margin-bottom: 20px;
            font-size: 1.4rem;
            display: flex;
            justify-content: space-between;
        }

        .close-modal {
            cursor: pointer;
            color: var(--text-muted);
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            margin-bottom: 6px;
            font-weight: 500;
            font-size: 0.95rem;
        }

        .input-group {
            display: flex;
            gap: 10px;
        }

        .input-group input {
            flex: 1;
            padding: 10px;
            border: 1px solid #cbd5e0;
            border-radius: 6px;
            outline: none;
        }

        .test-msg {
            font-size: 0.85rem;
            margin-top: 5px;
            min-height: 20px;
        }

        footer {
            margin-top: 50px;
            padding: 20px;
            text-align: center;
            color: #999;
            font-size: 13px;
        }

        @media (max-width: 600px) {
            .grid {
                grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
            }

            .card-img {
                height: 180px;
            }

            .search-container {
                flex-direction: column;
            }
        }
    </style>
</head>

<body>

    <header class="header">
        <h1>📺 弹幕推送-OK影视</h1>
        <button class="btn settings-btn" onclick="toggleModal(true)">⚙️ 设置</button>
    </header>

    <div class="search-container">
        <input type="text" id="searchInput" class="search-input" placeholder="输入影视名称，例如：生万物"
            onkeypress="if(event.key==='Enter') searchAnime()">
        <button class="btn" id="searchBtn" onclick="searchAnime()">搜索</button>
    </div>

    <main class="main-content" id="appContent">
        <div class="no-data">请输入名称开始搜索</div>
    </main>

    <footer>
        <div style="display: flex; justify-content: center; gap: 15px; margin-bottom: 5px;">
            <span>当前版本 v1.1.0</span> | <a href="https://github.com/Meroser/TVbox" target="_blank"
                style="color: #3b82f6; text-decoration: none;">访问 GitHub</a>
        </div>
        本站仅供个人学习研究使用，请勿用于商业用途。
    </footer>

    <div class="modal-overlay" id="settingsModal">
        <div class="modal">
            <h2>接口设置 <span class="close-modal" onclick="toggleModal(false)">✖</span></h2>
            <div class="form-group">
                <label>弹幕API (如 http://ip:port/token)</label>
                <div class="input-group">
                    <input type="text" id="apiUrlInput" placeholder="http://ip:port/token">
                    <button class="btn btn-secondary" onclick="testConn('apiUrlInput', 'apiTestMsg', false)">测试</button>
                </div>
                <div id="apiTestMsg" class="test-msg"></div>
            </div>
            <div class="form-group">
                <label>OK影视地址 (如 http://ip:port)</label>
                <div class="input-group">
                    <input type="text" id="okUrlInput" placeholder="http://ip:port">
                    <button class="btn btn-secondary" onclick="testConn('okUrlInput', 'okTestMsg', true)">测试</button>
                </div>
                <div id="okTestMsg" class="test-msg"></div>
            </div>
            <button class="btn" style="width: 100%; margin-top: 10px;" onclick="saveSettings()">保存配置</button>
        </div>
    </div>

    <script>
        // DOM快捷选择器
        const $ = id => document.getElementById(id);

        const SOURCE_CONFIG = {
            "source_data": {
                "tencent": { "name": "腾讯视频", "logo": "./danmu_logo/tencent.png" },
                "youku": { "name": "优酷", "logo": "./danmu_logo/youku.png" },
                "iqiyi": { "name": "爱奇艺", "logo": "./danmu_logo/iqiyi.png" },
                "imgo": { "name": "芒果TV", "logo": "./danmu_logo/imgo.png" },
                "bilibili": { "name": "哔哩哔哩", "logo": "./danmu_logo/bilibili.png" },
                "renren": { "name": "人人影视", "logo": "./danmu_logo/renren.png" },
                "360": { "name": "360视频", "logo": "./danmu_logo/360.png" },
                "vod": { "name": "vod", "logo": "./danmu_logo/vod.png" },
                "default": { "name": "其他", "logo": "./danmu_logo/default.png" }
            },
            "order": ["tencent", "youku", "iqiyi", "imgo", "bilibili", "renren", "360", "vod"]
        };

        let currentSearchResults = null;

        window.onload = () => {
            if (!localStorage.getItem('danmu_api_url') || !localStorage.getItem('danmu_ok_url')) toggleModal(true);
        };

        function toggleModal(show) {
            if (show) {
                $('apiUrlInput').value = localStorage.getItem('danmu_api_url') || '';
                $('okUrlInput').value = localStorage.getItem('danmu_ok_url') || '';
                $('apiTestMsg').innerHTML = $('okTestMsg').innerHTML = '';
            }
            $('settingsModal').style.display = show ? 'flex' : 'none';
        }

        const formatUrl = url => url.trim().replace(/\/$/, '');
        const cleanStr = (title, regex) => title.replace(regex, '').trim();

        // 合并精简版测试探针
        async function testConn(inputId, msgId, isOkMode) {
            const url = formatUrl($(inputId).value);
            const msgEl = $(msgId);
            if (!url) return msgEl.innerHTML = '<span style="color:#e53e3e">请输入完整地址</span>';

            msgEl.innerHTML = '<span style="color:#3182ce">测试中...</span>';
            try {
                await fetch(isOkMode ? `${url}/action?do=test` : url, { mode: 'no-cors' });
                msgEl.innerHTML = '<span style="color:#48bb78">✅ 连接成功</span>';
            } catch (e) {
                msgEl.innerHTML = '<span style="color:#e53e3e">❌ 连接失败</span>';
            }
        }

        function saveSettings() {
            const api = formatUrl($('apiUrlInput').value), ok = formatUrl($('okUrlInput').value);
            if (!api || !ok) return alert('请填写完整这两个地址！');
            localStorage.setItem('danmu_api_url', api);
            localStorage.setItem('danmu_ok_url', ok);
            toggleModal(false);
        }

        async function searchAnime() {
            const query = $('searchInput').value.trim();
            const apiUrl = localStorage.getItem('danmu_api_url');
            if (!query) return;
            if (!apiUrl) return toggleModal(true);

            $('searchBtn').disabled = true;
            $('searchBtn').innerText = '搜索中...';
            $('appContent').innerHTML = '<div class="loading">⏳ 正在搜索，请稍候...</div>';

            try {
                const res = await fetch(`${apiUrl}/api/v2/search/anime?keyword=${encodeURIComponent(query)}`);
                const data = await res.json();

                if (!data.success || !data.animes?.length) {
                    return $('appContent').innerHTML = '<div class="no-data">😔 未找到相关结果</div>';
                }

                currentSearchResults = data.animes;
                renderGroupedResults(data.animes);
            } catch (err) {
                $('appContent').innerHTML = `<div class="error">❌ 请求失败：${err.message}</div>`;
            } finally {
                $('searchBtn').disabled = false;
                $('searchBtn').innerText = '搜索';
            }
        }

        function renderGroupedResults(animes) {
            const grouped = animes.reduce((acc, anime) => {
                (acc[anime.source || 'other'] = acc[anime.source || 'other'] || []).push(anime);
                return acc;
            }, {});

            const sortedSources = Object.keys(grouped).sort((a, b) => {
                const iA = SOURCE_CONFIG.order.indexOf(a), iB = SOURCE_CONFIG.order.indexOf(b);
                if (iA !== -1 && iB !== -1) return iA - iB;
                return iA !== -1 ? -1 : iB !== -1 ? 1 : a.localeCompare(b);
            });

            $('appContent').innerHTML = sortedSources.map(source => {
                const items = grouped[source];
                const info = SOURCE_CONFIG.source_data[source] || SOURCE_CONFIG.source_data.default;
                const dName = SOURCE_CONFIG.source_data[source] ? info.name : source;

                return `
                <div class="source-group">
                    <h2 class="source-title">
                        <img src="${info.logo}" class="source-logo" onerror="this.src='${SOURCE_CONFIG.source_data.default.logo}'">
                        <span>${dName}</span><span class="source-count">${items.length}</span>
                    </h2>
                    <div class="grid">
                        ${items.map(anime => {
                    const cTitle = cleanStr(anime.animeTitle, /【.*/);
                    const img = anime.imageUrl || 'data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="10" height="10"><rect width="10" height="10" fill="%23edf2f7"/></svg>';
                    return `
                            <div class="card" onclick="fetchDetails(${anime.animeId}, '${anime.animeTitle.replace(/'/g, "\\'")}')">
                                <img class="card-img" src="${img}" alt="${cTitle}" loading="lazy">
                                <div class="card-info">
                                    <div class="card-title" title="${cTitle}">${cTitle}</div>
                                    <div class="card-meta">
                                        <span class="tag">${anime.type || '未知'}</span>
                                        <span class="tag" style="background:#e6fffa;color:#319795">${anime.episodeCount || '?'} 集</span>
                                    </div>
                                </div>
                            </div>`;
                }).join('')}
                    </div>
                </div>`;
            }).join('');
        }

        async function fetchDetails(animeId, rawTitle) {
            $('appContent').innerHTML = '<div class="loading">⏳ 加载剧集中...</div>';
            try {
                const res = await fetch(`${localStorage.getItem('danmu_api_url')}/api/v2/bangumi/${animeId}`);
                const data = await res.json();
                if (!data.bangumi?.episodes) throw new Error('无剧集数据');
                renderEpisodes(data.bangumi.episodes, cleanStr(rawTitle, /【.*/));
            } catch (err) {
                $('appContent').innerHTML = `<div class="error">❌ 加载失败：${err.message}</div>`;
            }
        }

        function renderEpisodes(episodes, title) {
            // 解析所有来源
            const grouped = episodes.reduce((acc, ep) => {
                const match = (ep.episodeTitle || '').match(/【(.*?)】/);
                const source = match ? match[1] : '默认/未分类';
                (acc[source] = acc[source] || []).push(ep);
                return acc;
            }, {});

            let html = `
                <div class="details-header">
                    <button class="back-btn" onclick="renderGroupedResults(currentSearchResults)">← 返回列表</button>
                    <h2>${title}</h2>
                </div>`;

            // 无论来源多少，固定展示美化版的分组 Header
            html += Object.entries(grouped).map(([source, eps]) => `
                <div class="episode-source-group">
                    <h3 class="episode-source-title">▶ 来源：${source}</h3>
                    <div class="episodes-list">
                        ${eps.map(ep => {
                const cTitle = cleanStr(ep.episodeTitle || `第 ${ep.episodeNumber} 集`, /【.*?】\s*/g);
                return `
                            <button class="episode-btn" onclick="pushDanmu(this, '${ep.episodeId}')" title="${cTitle}">
                                <span>${cTitle}</span><span style="font-size:0.8rem;color:var(--text-muted);">推送</span>
                            </button>`;
            }).join('')}
                    </div>
                </div>
            `).join('');

            $('appContent').innerHTML = html;
        }

        async function pushDanmu(btn, episodeId) {
            const api = localStorage.getItem('danmu_api_url'), ok = localStorage.getItem('danmu_ok_url');
            const originalHTML = btn.innerHTML;
            btn.innerHTML = '<span>推送中...</span>';
            btn.style.pointerEvents = 'none';

            try {
                await fetch(`${ok}/action?do=refresh&type=danmaku&path=${encodeURIComponent(`${api}/api/v2/comment/${episodeId}?format=xml`)}`, { mode: 'no-cors' });
                btn.style.cssText = 'border-color:#48bb78; background:#f0fff4; color:#2f855a; pointer-events:none;';
                btn.innerHTML = '<span>✅ 推送成功</span>';
            } catch (err) {
                btn.style.cssText = 'border-color:#e53e3e; background:#fff5f5; color:#c53030; pointer-events:none;';
                btn.innerHTML = '<span>❌ 推送失败</span>';
            }

            setTimeout(() => {
                btn.innerHTML = originalHTML;
                btn.style.cssText = '';
            }, 2500);
        }
    </script>
</body>

</html>
